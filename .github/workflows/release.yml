name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win-x64
            pkg-target: node18-win-x64
            output-name: AiAdminBot.exe
            archive-name: AiAdminBot-windows-x64.zip
          - os: macos-latest
            target: macos-x64
            pkg-target: node18-macos-x64
            output-name: AiAdminBot-macos
            archive-name: AiAdminBot-macos-x64.zip
          - os: ubuntu-latest
            target: linux-x64
            pkg-target: node18-linux-x64
            output-name: AiAdminBot-linux
            archive-name: AiAdminBot-linux-x64.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      - name: Build executable
        run: pkg . --target ${{ matrix.pkg-target }} --output ${{ matrix.output-name }}

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p build/config
          cp ${{ matrix.output-name }} build/
          cp .env.example build/
          cp README.md build/
          cp LICENSE build/
          cp -r locales build/
          cp config/*.example.json build/config/ 2>/dev/null || true

      - name: Create archive (Windows)
        if: matrix.target == 'win-x64'
        shell: bash
        run: cd build && 7z a ../${{ matrix.archive-name }} *

      - name: Create archive (macOS)
        if: matrix.target == 'macos-x64'
        run: cd build && zip -r ../${{ matrix.archive-name }} .

      - name: Create archive (Linux)
        if: matrix.target == 'linux-x64'
        run: cd build && tar czf ../${{ matrix.archive-name }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-build
          path: ${{ matrix.archive-name }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
