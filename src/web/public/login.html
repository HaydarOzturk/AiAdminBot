<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Login</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="/img/logo.png" alt="Admin+AI Logo" style="width:140px; border-radius:20px; margin-bottom:20px; filter:drop-shadow(0 0 20px rgba(0,240,255,0.5)); animation: logoPulse 3s ease-in-out infinite;">
        <style>
          @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 12px rgba(0,240,255,0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px rgba(0,240,255,0.7)); transform: scale(1.03); }
          }
        </style>
        <h1>Admin+AI</h1>
        <p>Dashboard Login</p>
      </div>

      <div class="login-error" id="error-message"></div>

      <div id="discord-login">
        <a href="/api/auth/discord" class="btn btn-block" style="background:#5865F2; color:#fff; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:8px; padding:12px 20px; border-radius:8px; font-weight:600; font-size:15px;">
          <svg width="20" height="15" viewBox="0 0 71 55" fill="none"><path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.7 40.7 0 00-1.8 3.7 54 54 0 00-16.2 0A39 39 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 4.9a.2.2 0 00-.1.1C1.5 18.7-.9 32.2.3 45.5v.1a58.7 58.7 0 0017.9 9.1.2.2 0 00.3-.1 42 42 0 003.6-5.9.2.2 0 00-.1-.3 38.7 38.7 0 01-5.5-2.7.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 41.9 41.9 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .3 36.4 36.4 0 01-5.5 2.7.2.2 0 00-.1.4 47.2 47.2 0 003.6 5.9.2.2 0 00.2.1A58.5 58.5 0 0070.3 45.6v-.1c1.4-15-2.3-28-9.8-39.6a.2.2 0 00-.1 0zM23.7 37.3c-3.4 0-6.2-3.1-6.2-7s2.7-7 6.2-7 6.3 3.2 6.2 7-2.8 7-6.2 7zm22.9 0c-3.4 0-6.2-3.1-6.2-7s2.7-7 6.2-7 6.3 3.2 6.2 7-2.7 7-6.2 7z" fill="white"/></svg>
          Login with Discord
        </a>
        <p style="text-align:center; margin-top:12px; color:var(--text-muted); font-size:12px;">Only server owners can access the dashboard</p>
      </div>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
  <script>
    // Check if already authenticated
    fetch('/api/auth/status').then(r => r.json()).then(data => {
      if (data.authenticated) {
        window.location.href = '/';
      }
      if (!data.oauthConfigured) {
        document.getElementById('error-message').textContent = 'Discord OAuth is not configured. Set WEB_OAUTH_CLIENT_SECRET and WEB_OAUTH_REDIRECT_URI in .env';
        document.getElementById('error-message').classList.add('show');
        document.getElementById('discord-login').style.display = 'none';
      }
    }).catch(() => {});
  </script>
</body>
</html>
