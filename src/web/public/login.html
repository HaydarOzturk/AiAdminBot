<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Login</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="/img/logo.png" alt="Admin+AI Logo" style="width:140px; border-radius:20px; margin-bottom:20px; filter:drop-shadow(0 0 20px rgba(0,240,255,0.5)); animation: logoPulse 3s ease-in-out infinite;">
        <style>
          @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 12px rgba(0,240,255,0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px rgba(0,240,255,0.7)); transform: scale(1.03); }
          }
        </style>
        <h1>Admin+AI</h1>
        <p>Dashboard Login</p>
      </div>

      <div class="login-error" id="error-message"></div>

      <!-- Discord OAuth Login (shown only when configured) -->
      <div id="discord-login" style="display:none; margin-bottom:20px;">
        <a href="/api/auth/discord" class="btn btn-block" style="background:#5865F2; color:#fff; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:8px; padding:12px 20px; border-radius:8px; font-weight:600; font-size:15px;">
          <svg width="20" height="15" viewBox="0 0 71 55" fill="none"><path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.7 40.7 0 00-1.8 3.7 54 54 0 00-16.2 0A39 39 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 4.9a.2.2 0 00-.1.1C1.5 18.7-.9 32.2.3 45.5v.1a58.7 58.7 0 0017.9 9.1.2.2 0 00.3-.1 42 42 0 003.6-5.9.2.2 0 00-.1-.3 38.7 38.7 0 01-5.5-2.7.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 41.9 41.9 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .3 36.4 36.4 0 01-5.5 2.7.2.2 0 00-.1.4 47.2 47.2 0 003.6 5.9.2.2 0 00.2.1A58.5 58.5 0 0070.3 45.6v-.1c1.4-15-2.3-28-9.8-39.6a.2.2 0 00-.1 0zM23.7 37.3c-3.4 0-6.2-3.1-6.2-7s2.7-7 6.2-7 6.3 3.2 6.2 7-2.8 7-6.2 7zm22.9 0c-3.4 0-6.2-3.1-6.2-7s2.7-7 6.2-7 6.3 3.2 6.2 7-2.7 7-6.2 7z" fill="white"/></svg>
          Login with Discord
        </a>
      </div>

      <!-- Divider (shown when both methods available) -->
      <div id="auth-divider" style="display:none; text-align:center; margin-bottom:16px; color:var(--text-muted); font-size:12px;">
        <span style="background:var(--bg-secondary); padding:0 12px; position:relative; z-index:1;">or</span>
        <hr style="margin-top:-8px; border:0; border-top:1px solid var(--border-color);">
      </div>

      <!-- Password Login -->
      <form class="login-form" id="login-form">
        <div class="form-group">
          <label for="password">Admin Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter password"
            required
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          Login with Password
        </button>
      </form>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
  <script>
    // Check if Discord OAuth is configured and show the button
    fetch('/api/auth/status').then(r => r.json()).then(data => {
      if (data.oauthConfigured) {
        document.getElementById('discord-login').style.display = 'block';
        document.getElementById('auth-divider').style.display = 'block';
      }
      if (data.authenticated) {
        window.location.href = '/';
      }
    }).catch(() => {});

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-message');

      // Clear previous errors
      errorDiv.textContent = '';
      errorDiv.classList.remove('show');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ password }),
        });

        if (response.ok) {
          // Success - redirect to dashboard
          window.location.href = '/';
        } else if (response.status === 401) {
          // Invalid password
          errorDiv.textContent = 'Invalid password. Please try again.';
          errorDiv.classList.add('show');
        } else {
          // Other error
          const data = await response.json();
          errorDiv.textContent = data.message || 'Login failed. Please try again.';
          errorDiv.classList.add('show');
        }
      } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.classList.add('show');
      }
    });
  </script>
</body>
</html>
